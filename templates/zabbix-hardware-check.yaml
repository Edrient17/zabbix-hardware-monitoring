zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 20d4525b3f5b524ab27dcd653b57335c
      name: Templates/Hardware
  templates:
    - uuid: 5fe9a4aff5b359edbce89ef824fdbfa0
      template: 'Template Hardware Check'
      name: 'Template Hardware Check'
      description: |
        Monitors Linux server hardware through Zabbix Agent 1 UserParameter keys.

        Required agent files:
        - /etc/zabbix/zabbix_agentd.conf.d/hardware-check.conf
        - /etc/zabbix/scripts/hardware-check.sh
      groups:
        - name: Templates/Hardware
      items:
        - uuid: 4f28722ffe185785a9f0ece6d8da555d
          name: 'Hardware check: Agent ping'
          key: hw.agent.ping
          delay: 1m
          history: 7d
          trends: 90d
          value_type: UNSIGNED
          tags:
            - tag: component
              value: hardware
        - uuid: 77cbd5a430f5532b88644c085a5d3dee
          name: 'Hardware check: ipmitool availability'
          key: hw.tools.ipmitool
          delay: 10m
          history: 7d
          trends: 90d
          value_type: UNSIGNED
          valuemap:
            name: 'Hardware check availability'
          tags:
            - tag: component
              value: tool
        - uuid: d07be5188618514a8ce31bb9fd4a20dd
          name: 'Hardware check: smartctl availability'
          key: hw.tools.smartctl
          delay: 10m
          history: 7d
          trends: 90d
          value_type: UNSIGNED
          valuemap:
            name: 'Hardware check availability'
          tags:
            - tag: component
              value: tool
        - uuid: b9ffe6bdf4275254af3f9b9ea7ff344b
          name: 'Hardware check: rasdaemon availability'
          key: hw.tools.rasdaemon
          delay: 10m
          history: 7d
          trends: 90d
          value_type: UNSIGNED
          valuemap:
            name: 'Hardware check availability'
          tags:
            - tag: component
              value: tool
        - uuid: c8084e921538511891ed6a2152c961b5
          name: 'Hardware check: rasdaemon status'
          key: hw.ras.status
          delay: 5m
          history: 7d
          trends: 90d
          value_type: UNSIGNED
          valuemap:
            name: 'Hardware check availability'
          tags:
            - tag: component
              value: memory
        - uuid: f3014eb3663e5681997c1e126907beb6
          name: 'Hardware check: Memory corrected error count'
          key: hw.memory.ce.count
          delay: 5m
          history: 30d
          trends: 365d
          value_type: UNSIGNED
          tags:
            - tag: component
              value: memory
        - uuid: 3aab759faae8587abac0fc7eb6cc8ce9
          name: 'Hardware check: Memory uncorrected error count'
          key: hw.memory.ue.count
          delay: 5m
          history: 30d
          trends: 365d
          value_type: UNSIGNED
          tags:
            - tag: component
              value: memory
      discovery_rules:
        - uuid: 35ef8d3c708d5df78b15948e3ae37e5a
          name: 'Hardware check: Temperature sensor discovery'
          key: hw.temp.discovery
          delay: 10m
          item_prototypes:
            - uuid: c3f1658923b5587cbe34c51663834ee6
              name: 'Hardware check: Temperature {#SENSOR} [{#SENSOR_ID}]'
              key: 'hw.temp.value_by_id["{#SENSOR_ID}"]'
              delay: 1m
              history: 30d
              trends: 365d
              value_type: FLOAT
              units: C
              tags:
                - tag: component
                  value: temperature
                - tag: sensor
                  value: '{#SENSOR}'
                - tag: sensor_id
                  value: '{#SENSOR_ID}'
        - uuid: 73951fa5bb7852a38331e75cbb286f70
          name: 'Hardware check: Fan discovery'
          key: hw.fan.discovery
          delay: 10m
          item_prototypes:
            - uuid: 4f486fc76ff159edaa4915344ef588a1
              name: 'Hardware check: Fan {#SENSOR} [{#SENSOR_ID}] speed'
              key: 'hw.fan.rpm_by_id["{#SENSOR_ID}"]'
              delay: 1m
              history: 30d
              trends: 365d
              value_type: FLOAT
              units: rpm
              tags:
                - tag: component
                  value: fan
                - tag: sensor
                  value: '{#SENSOR}'
                - tag: sensor_id
                  value: '{#SENSOR_ID}'
        - uuid: 55efddef20d35aa0b0fa774dbb6327e3
          name: 'Hardware check: PSU discovery'
          key: hw.psu.discovery
          delay: 10m
          item_prototypes:
            - uuid: f32055a31f1b5c508eaa32c86d97bf72
              name: 'Hardware check: PSU {#SENSOR} [{#SENSOR_ID}] status'
              key: 'hw.psu.status_by_id["{#SENSOR_ID}"]'
              delay: 1m
              history: 30d
              trends: 365d
              value_type: UNSIGNED
              valuemap:
                name: 'Hardware check status'
              tags:
                - tag: component
                  value: power
                - tag: sensor
                  value: '{#SENSOR}'
                - tag: sensor_id
                  value: '{#SENSOR_ID}'
        - uuid: 8f0d0c2d89075fa4b7d78b1a29b108c9
          name: 'Hardware check: Disk discovery'
          key: hw.disk.discovery
          delay: 1h
          item_prototypes:
            - uuid: 8114bf03a3a1565a827d029408f5a91f
              name: 'Hardware check: Disk {#DISK} SMART health'
              key: 'hw.disk.smart.health["{#DISK}","{#SMART_TYPE}"]'
              delay: 5m
              history: 30d
              trends: 365d
              value_type: UNSIGNED
              valuemap:
                name: 'Hardware check status'
              tags:
                - tag: component
                  value: disk
                - tag: disk
                  value: '{#DISK}'
      valuemaps:
        - uuid: e3733c952a6f565a97d37048a4a3980d
          name: 'Hardware check status'
          mappings:
            - value: '0'
              newvalue: OK
            - value: '1'
              newvalue: Problem
            - value: '2'
              newvalue: Unknown
        - uuid: acaf10f4b1315ed5bed64c845de63990
          name: 'Hardware check availability'
          mappings:
            - value: '0'
              newvalue: 'Not available'
            - value: '1'
              newvalue: Available
