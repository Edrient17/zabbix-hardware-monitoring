zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 954ac085e4f14109a89bd171404ee0bf
      name: Templates/Hardware
  templates:
    - uuid: ea6b29de0bbf4d33ba7f4ebf4498646a
      template: 'Template Hardware Check'
      name: 'Template Hardware Check'
      description: |
        Monitors Linux server hardware through Zabbix Agent 1 UserParameter keys.

        Required agent files:
        - /etc/zabbix/zabbix_agentd.conf.d/hardware-check.conf
        - /etc/zabbix/scripts/hardware-check.sh
      groups:
        - name: Templates/Hardware
      items:
        - uuid: fe237e201d3a44febc396a41a9cf9efd
          name: 'Hardware check: Agent ping'
          key: hw.agent.ping
          delay: 1m
          history: 7d
          trends: 90d
          value_type: UNSIGNED
          tags:
            - tag: component
              value: hardware
        - uuid: c9dc0a955f26478abcbd7fb635d6a290
          name: 'Hardware check: ipmitool availability'
          key: hw.tools.ipmitool
          delay: 10m
          history: 7d
          trends: 90d
          value_type: UNSIGNED
          valuemap:
            name: 'Hardware check availability'
          tags:
            - tag: component
              value: tool
        - uuid: 0b63697e5291457e80b3c0833de849cb
          name: 'Hardware check: smartctl availability'
          key: hw.tools.smartctl
          delay: 10m
          history: 7d
          trends: 90d
          value_type: UNSIGNED
          valuemap:
            name: 'Hardware check availability'
          tags:
            - tag: component
              value: tool
        - uuid: dd6434ee9ee34670b0f204b9f35b2041
          name: 'Hardware check: rasdaemon availability'
          key: hw.tools.rasdaemon
          delay: 10m
          history: 7d
          trends: 90d
          value_type: UNSIGNED
          valuemap:
            name: 'Hardware check availability'
          tags:
            - tag: component
              value: tool
        - uuid: 3df7ceccce174b8091657893fd750e37
          name: 'Hardware check: Memory corrected error count'
          key: hw.memory.ce.count
          delay: 5m
          history: 30d
          trends: 365d
          value_type: UNSIGNED
          tags:
            - tag: component
              value: memory
        - uuid: ee18718ff4164a488404b07b4999c086
          name: 'Hardware check: Memory uncorrected error count'
          key: hw.memory.ue.count
          delay: 5m
          history: 30d
          trends: 365d
          value_type: UNSIGNED
          tags:
            - tag: component
              value: memory
      discovery_rules:
        - uuid: fbc419059c5a46babbba4ab5e8f7c6b6
          name: 'Hardware check: Temperature sensor discovery'
          key: hw.temp.discovery
          delay: 10m
          item_prototypes:
            - uuid: 23beeb5a920a4c2583cf7529583a8a7e
              name: 'Hardware check: Temperature {#SENSOR} [{#SENSOR_ID}]'
              key: 'hw.temp.value_by_id["{#SENSOR_ID}"]'
              delay: 1m
              history: 30d
              trends: 365d
              value_type: FLOAT
              units: C
              tags:
                - tag: component
                  value: temperature
                - tag: sensor
                  value: '{#SENSOR}'
                - tag: sensor_id
                  value: '{#SENSOR_ID}'
        - uuid: ffc28cc5bef842c59d829b560656ec70
          name: 'Hardware check: Fan discovery'
          key: hw.fan.discovery
          delay: 10m
          item_prototypes:
            - uuid: d5cbae4c334244ef892faeac8c4d6afe
              name: 'Hardware check: Fan {#SENSOR} [{#SENSOR_ID}] speed'
              key: 'hw.fan.rpm_by_id["{#SENSOR_ID}"]'
              delay: 1m
              history: 30d
              trends: 365d
              value_type: FLOAT
              units: rpm
              tags:
                - tag: component
                  value: fan
                - tag: sensor
                  value: '{#SENSOR}'
                - tag: sensor_id
                  value: '{#SENSOR_ID}'
        - uuid: 289542a631d8414388bafa4f864cb4a2
          name: 'Hardware check: PSU discovery'
          key: hw.psu.discovery
          delay: 10m
          item_prototypes:
            - uuid: 83c89ac2d34f4deaa6c281c321718649
              name: 'Hardware check: PSU {#SENSOR} [{#SENSOR_ID}] status'
              key: 'hw.psu.status_by_id["{#SENSOR_ID}"]'
              delay: 1m
              history: 30d
              trends: 365d
              value_type: UNSIGNED
              valuemap:
                name: 'Hardware check status'
              tags:
                - tag: component
                  value: power
                - tag: sensor
                  value: '{#SENSOR}'
                - tag: sensor_id
                  value: '{#SENSOR_ID}'
        - uuid: 5496b6fda51a4d9194097eb94fad1213
          name: 'Hardware check: Disk discovery'
          key: hw.disk.discovery
          delay: 1h
          item_prototypes:
            - uuid: 7cdd2bcf210440e09313e3eece8d8a87
              name: 'Hardware check: Disk {#DISK_ID} SMART health'
              key: 'hw.disk.smart.health["{#DISK}","{#SMART_TYPE}"]'
              delay: 5m
              history: 30d
              trends: 365d
              value_type: UNSIGNED
              valuemap:
                name: 'Hardware check status'
              tags:
                - tag: component
                  value: disk
                - tag: disk
                  value: '{#DISK_ID}'
      valuemaps:
        - uuid: 1549e4120dbe44ccbf4a3df9662a47d1
          name: 'Hardware check status'
          mappings:
            - value: '0'
              newvalue: OK
            - value: '1'
              newvalue: Problem
            - value: '2'
              newvalue: Unknown
        - uuid: ec222ba8047146fab186bd57626c1744
          name: 'Hardware check availability'
          mappings:
            - value: '0'
              newvalue: 'Not available'
            - value: '1'
              newvalue: Available
