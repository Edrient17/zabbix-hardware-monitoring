services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16.14-alpine3.24}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbix_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 10

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:${ZABBIX_IMAGE_TAG:-ubuntu-7.4.12}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbix_password}
      ZBX_TIMEOUT: ${ZBX_TIMEOUT:-30}
    ports:
      - "${ZABBIX_SERVER_PORT:-10051}:10051"
    volumes:
      - zabbix-server-alertscripts:/usr/lib/zabbix/alertscripts
      - zabbix-server-externalscripts:/usr/lib/zabbix/externalscripts

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:${ZABBIX_IMAGE_TAG:-ubuntu-7.4.12}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbix_password}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: ${PHP_TZ:-Asia/Seoul}
    ports:
      - "${ZABBIX_WEB_PORT:-8080}:8080"

volumes:
  postgres-data:
  zabbix-server-alertscripts:
  zabbix-server-externalscripts:
