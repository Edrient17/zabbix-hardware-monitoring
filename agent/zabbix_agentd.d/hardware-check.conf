# Hardware monitoring keys for Zabbix Agent 1 passive checks.
# Install agent/scripts/hardware-check.sh to /etc/zabbix/scripts/hardware-check.sh.

UserParameter=hw.tools.ipmitool,/etc/zabbix/scripts/hardware-check.sh tool ipmitool
UserParameter=hw.tools.smartctl,/etc/zabbix/scripts/hardware-check.sh tool smartctl
UserParameter=hw.tools.rasdaemon,/etc/zabbix/scripts/hardware-check.sh tool ras-mc-ctl

UserParameter=hw.ipmi.sensor.discovery[*],/etc/zabbix/scripts/hardware-check.sh ipmi-discovery "$1"
UserParameter=hw.ipmi.sensor.value[*],/etc/zabbix/scripts/hardware-check.sh ipmi-value "$1"
UserParameter=hw.ipmi.sensor.value_by_id[*],/etc/zabbix/scripts/hardware-check.sh ipmi-value-by-id "$1"
UserParameter=hw.ipmi.sensor.status[*],/etc/zabbix/scripts/hardware-check.sh ipmi-status "$1"
UserParameter=hw.ipmi.sensor.status_by_id[*],/etc/zabbix/scripts/hardware-check.sh ipmi-status-by-id "$1"

UserParameter=hw.temp.discovery,/etc/zabbix/scripts/hardware-check.sh ipmi-discovery temperature
UserParameter=hw.temp.value[*],/etc/zabbix/scripts/hardware-check.sh ipmi-value "$1"
UserParameter=hw.temp.value_by_id[*],/etc/zabbix/scripts/hardware-check.sh ipmi-value-by-id "$1"
UserParameter=hw.temp.status_by_id[*],/etc/zabbix/scripts/hardware-check.sh ipmi-status-by-id "$1"
UserParameter=hw.fan.discovery,/etc/zabbix/scripts/hardware-check.sh ipmi-discovery fan
UserParameter=hw.fan.rpm[*],/etc/zabbix/scripts/hardware-check.sh ipmi-value "$1"
UserParameter=hw.fan.rpm_by_id[*],/etc/zabbix/scripts/hardware-check.sh ipmi-value-by-id "$1"
UserParameter=hw.fan.status_by_id[*],/etc/zabbix/scripts/hardware-check.sh ipmi-status-by-id "$1"
UserParameter=hw.psu.discovery,/etc/zabbix/scripts/hardware-check.sh psu-discovery
UserParameter=hw.psu.status[*],/etc/zabbix/scripts/hardware-check.sh psu-status "$1"
UserParameter=hw.psu.status_by_id[*],/etc/zabbix/scripts/hardware-check.sh psu-status-by-id "$1"
UserParameter=hw.voltage.discovery,/etc/zabbix/scripts/hardware-check.sh ipmi-discovery voltage
UserParameter=hw.voltage.value_by_id[*],/etc/zabbix/scripts/hardware-check.sh ipmi-value-by-id "$1"
UserParameter=hw.voltage.status_by_id[*],/etc/zabbix/scripts/hardware-check.sh ipmi-status-by-id "$1"

UserParameter=hw.disk.discovery,/etc/zabbix/scripts/hardware-check.sh disk-discovery
UserParameter=hw.disk.smart.health[*],/etc/zabbix/scripts/hardware-check.sh smart-health "$1" "$2"
UserParameter=hw.disk.smart.attr[*],/etc/zabbix/scripts/hardware-check.sh smart-attr "$1" "$2" "$3"

UserParameter=hw.memory.ce.count,/etc/zabbix/scripts/hardware-check.sh memory-ce-count
UserParameter=hw.memory.ue.count,/etc/zabbix/scripts/hardware-check.sh memory-ue-count
