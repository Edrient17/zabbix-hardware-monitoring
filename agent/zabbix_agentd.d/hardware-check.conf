# Hardware monitoring keys will be implemented with passive checks.
# Keep commands under /etc/zabbix/scripts so they are easy to review and mount read-only.

UserParameter=hw.agent.ping,echo 1
UserParameter=hw.tools.ipmitool,command -v ipmitool >/dev/null 2>&1 && echo 1 || echo 0
UserParameter=hw.tools.smartctl,command -v smartctl >/dev/null 2>&1 && echo 1 || echo 0
UserParameter=hw.tools.rasdaemon,command -v ras-mc-ctl >/dev/null 2>&1 && echo 1 || echo 0
