---
- name: Deploy Zabbix hardware UserParameter checks
  hosts: hardware_targets
  become: true
  gather_facts: true

  vars:
    zabbix_agent_include_dir: /etc/zabbix/zabbix_agentd.conf.d
    zabbix_scripts_dir: /etc/zabbix/scripts
    zabbix_agent_service: zabbix-agent
    hardware_check_packages:
      - ipmitool
      - smartmontools
      - rasdaemon
      - sqlite3

  tasks:
    - name: Ensure target OS is Debian family
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "This playbook currently installs packages with apt and supports Debian/Ubuntu targets."

    - name: Install hardware monitoring packages
      ansible.builtin.apt:
        name: "{{ hardware_check_packages }}"
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Enable and start rasdaemon service
      ansible.builtin.service:
        name: rasdaemon
        enabled: true
        state: started

    - name: Ensure Zabbix Agent include directory exists
      ansible.builtin.file:
        path: "{{ zabbix_agent_include_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure Zabbix scripts directory exists
      ansible.builtin.file:
        path: "{{ zabbix_scripts_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy hardware UserParameter config
      ansible.builtin.copy:
        src: ../agent/zabbix_agentd.d/hardware-check.conf
        dest: "{{ zabbix_agent_include_dir }}/hardware-check.conf"
        owner: root
        group: root
        mode: "0644"
      notify: Restart zabbix-agent

    - name: Deploy hardware check script
      ansible.builtin.copy:
        src: ../agent/scripts/hardware-check.sh
        dest: "{{ zabbix_scripts_dir }}/hardware-check.sh"
        owner: root
        group: root
        mode: "0755"

    - name: Apply config changes before validation
      ansible.builtin.meta: flush_handlers

    - name: Check ipmitool UserParameter
      ansible.builtin.command:
        cmd: zabbix_agentd -t hw.tools.ipmitool
      register: check_ipmitool
      changed_when: false
      failed_when: check_ipmitool.rc != 0
      when: not ansible_check_mode

    - name: Check smartctl UserParameter
      ansible.builtin.command:
        cmd: zabbix_agentd -t hw.tools.smartctl
      register: check_smartctl
      changed_when: false
      failed_when: check_smartctl.rc != 0
      when: not ansible_check_mode

    - name: Check rasdaemon UserParameter
      ansible.builtin.command:
        cmd: zabbix_agentd -t hw.tools.rasdaemon
      register: check_rasdaemon
      changed_when: false
      failed_when: check_rasdaemon.rc != 0
      when: not ansible_check_mode

    - name: Check temperature discovery
      ansible.builtin.command:
        cmd: zabbix_agentd -t hw.temp.discovery
      register: check_temp_discovery
      changed_when: false
      failed_when: check_temp_discovery.rc != 0
      when: not ansible_check_mode

    - name: Print validation summary
      ansible.builtin.debug:
        msg:
          - "{{ check_ipmitool.stdout }}"
          - "{{ check_smartctl.stdout }}"
          - "{{ check_rasdaemon.stdout }}"
          - "{{ check_temp_discovery.stdout }}"
      when: not ansible_check_mode

  handlers:
    - name: Restart zabbix-agent
      ansible.builtin.service:
        name: "{{ zabbix_agent_service }}"
        state: restarted
