[hardware_targets]
# Replace these examples with the Linux servers monitored by Zabbix Agent 1.
# server01 ansible_host=10.0.0.11 ansible_user=ubuntu
# server02 ansible_host=10.0.0.12 ansible_user=ubuntu

[hardware_targets:vars]
# Match the Include directory used by /etc/zabbix/zabbix_agentd.conf.
# Common values:
#   /etc/zabbix/zabbix_agentd.d
#   /etc/zabbix/zabbix_agentd.conf.d
zabbix_agent_include_dir=/etc/zabbix/zabbix_agentd.conf.d
zabbix_scripts_dir=/etc/zabbix/scripts
zabbix_agent_service=zabbix-agent

# Override if a target uses different package names or you want to skip one.
# hardware_check_packages=["ipmitool","smartmontools","rasdaemon","sqlite3"]
